output:
  - summary
  - success
  - failure
  - execution
  - execution_out
  - skips

no_tty: true

pre-commit:
  jobs:
    - name: check format code
      run: pnpm run format
      glob: '*.{js,ts,jsx,tsx}'

    - name: check code lint
      run: pnpm run lint
      glob: '*.{js,ts,jsx,tsx}'

    - name: typecheck
      run: pnpm run typecheck
      glob: '*.{js,ts,jsx,tsx}'
