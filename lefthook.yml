output:
  - summary
  - success
  - failure
  - execution
  - execution_out
  - skips

no_tty: true

pre-commit:
  jobs:
    - name: fix code
      run: pnpm run fix
      glob: '*.{js,ts,jsx,tsx}'
      stage_fixed: true

    - name: typecheck
      run: pnpm run typecheck
      glob: '*.{js,ts,jsx,tsx}'
