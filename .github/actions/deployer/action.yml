name: 'Deploy to Kubernetes'

description: 'Deploys the application to Kubernetes using kubectl.'

inputs:
  kubeconfig:
    description: 'Path to the kubeconfig file.'
    default: '~/.kube/config'

  namespace:
    description: 'Kubernetes namespace to deploy to.'
    required: true

  service-name:
    description: 'Kubernetes service name.'
    required: true

  database-uri:
    description: 'Database connection string.'
    default: 'mongodb://localhost:27017'

  manifest-dir:
    description: 'Directory containing Kubernetes manifests.'
    default: './k8s'

  image:
    description: 'Full Docker image reference (with tag).'
    required: true

  command:
    description: 'Command to run (pnpm run <command>).'
    default: 'start'

  instance:
    description: 'Replica count.'
    default: '1'

runs:
  using: 'composite'
  steps:
    - id: commit
      shell: bash
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B | tr -d '\n' | cut -c1-240)
        echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV

    - shell: bash
      run: |
        VERSION=${{ inputs.image }}
        VERSION=${VERSION##*:}

        for file in "${{ inputs.manifest-dir }}"/*.yaml; do
          sed \
            -e "s|\${IMAGE}|${{ inputs.image }}|g" \
            -e "s|\${NAMESPACE}|${{ inputs.namespace }}|g" \
            -e "s|\${SERVICE-NAME}|${{ inputs.service-name }}|g" \
            -e "s|\${DB_CONNECTION}|${{ inputs.database-uri }}|g" \
            -e "s|\${COMMAND}|${{ inputs.command }}|g" \
            -e "s|\${VERSION}|${VERSION}|g" \
            -e "s|\${INSTANCE}|${{ inputs.instance }}|g" \
            -i "$file"
        done

    - shell: bash
      run: |
        kubectl --kubeconfig ${{ inputs.kubeconfig }} apply -f ${{ inputs.manifest-dir }}
        kubectl --kubeconfig ${{ inputs.kubeconfig }} rollout restart deployment ${{ inputs.service-name }} -n ${{ inputs.namespace }}
        kubectl annotate deployment ${{ inputs.service-name }} git-commit-message="${{ env.COMMIT_MSG }}" -n ${{ inputs.namespace }} --overwrite
