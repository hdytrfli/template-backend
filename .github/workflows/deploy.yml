name: Deploy

on:
  push:
    branches: [deploy]

jobs:
  build:
    runs-on: [self-hosted, builder]

    env:
      COREPACK_ENABLE_STRICT: '0'

    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - run: corepack enable
        name: Enable pnpm

      - run: pnpm install --frozen-lockfile
        name: Install dependencies

      - run: pnpm check
        name: Type-check, lint, and format

      - run: pnpm test
        name: Run tests

      - run: pnpm build
        name: Build

      - name: Login to registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: docker buildx build -t ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }} --platform linux/amd64,linux/arm64 . --push

  deploy:
    runs-on: [self-hosted, deployer]

    needs: build

    steps:
      - uses: actions/checkout@v4
        name: Checkout code

      - id: commit
        shell: bash
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | tr -d '\n' | cut -c1-240)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV

      - shell: bash
        run: |
          for file in ./k8s/*.yaml; do
            sed \
              -e "s|\${IMAGE}|${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}|g" \
              -e "s|\${NAMESPACE}|${{ secrets.K8S_NAMESPACE }}|g" \
              -e "s|\${SERVICE-NAME}|${{ secrets.K8S_SERVICE_NAME }}|g" \
              -e "s|\${DB_CONNECTION}|${{ secrets.DATABASE_URI }}|g" \
              -e "s|\${VERSION}|${{ github.sha }}|g" \
              -e "s|\${COMMAND}|start|g" \
              -e "s|\${INSTANCE}|1|g" \
              -i "$file"
          done

      - shell: bash
        run: |
          kubectl apply -f ./k8s/
          kubectl rollout restart deployment ${{ secrets.K8S_SERVICE_NAME }} -n ${{ secrets.K8S_NAMESPACE }}
          kubectl annotate deployment ${{ secrets.K8S_SERVICE_NAME }} git-commit-message="${{ env.COMMIT_MSG }}" -n ${{ secrets.K8S_NAMESPACE }} --overwrite
