name: Deploy

on:
  push:
    branches: [deploy]

jobs:
  initial:
    runs-on: [self-hosted, builder]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Notify workflow started
        uses: ./.github/actions/notify
        with:
          status: started
          phase: Deploy
          chat_id: ${{ secrets.CHAT_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}

  build:
    runs-on: [self-hosted, builder]

    needs: initial

    env:
      COREPACK_ENABLE_STRICT: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check, lint, and format
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:buildcache,mode=max

      - name: Notify build result
        uses: ./.github/actions/notify
        with:
          status: ${{ job.status }}
          phase: Build
          chat_id: ${{ secrets.CHAT_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}

  deploy:
    runs-on: [self-hosted, deployer]

    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure K3s
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy to K3s
        run: |
          kubectl set env deployment/${{ secrets.SERVICE_NAME }} BUILD_VERSION=${{ github.sha }} BUILD_DATE=${{ github.event.head_commit.timestamp }} -n ${{ secrets.NAMESPACE }}
          kubectl set image deployment/${{ secrets.SERVICE_NAME }} ${{ secrets.SERVICE_NAME }}=${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE }}:${{ github.sha }} -n ${{ secrets.NAMESPACE }}
          kubectl annotate deployment/${{ secrets.SERVICE_NAME }} "git-commit-message=${{ github.event.head_commit.message }}" -n ${{ secrets.NAMESPACE }} --overwrite

      - name: Notify deploy result
        uses: ./.github/actions/notify
        with:
          status: ${{ job.status }}
          phase: Deploy
          chat_id: ${{ secrets.CHAT_ID }}
          bot_token: ${{ secrets.BOT_TOKEN }}
